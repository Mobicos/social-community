services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: eureka-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123456}
      MYSQL_DATABASE: mydb_dev
      TZ: Asia/Shanghai
    ports:
      - "13306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: eureka-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123456}
    ports:
      - "16379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RocketMQ (NameServer + Broker + Console 整合)
  rocketmq:
    image: xuchengen/rocketmq:5.1.0
    container_name: eureka-rocketmq
    ports:
      - "19876:9876"    # NameServer
      - "10911:10911"   # Broker
      - "10909:10909"   # Broker HA
      - "8180:8080"     # Console
    environment:
      JAVA_OPT_EXT: "-server -Xms512m -Xmx512m"
    volumes:
      - ./data/rocketmq:/home/app/data

  # Elasticsearch
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: eureka-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "19200:9200"
      - "19300:9300"
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # FastDFS Tracker + Storage (合一部署)
  fastdfs:
    image: delron/fastdfs:latest
    container_name: eureka-fastdfs
    environment:
      TRACKER_SERVER: "localhost:22122"
    ports:
      - "22122:22122"
      - "18888:8888"
      - "23000:23000"
    volumes:
      - ./data/fastdfs-tracker:/var/fdfs/tracker
      - ./data/fastdfs-storage:/var/fdfs/storage
